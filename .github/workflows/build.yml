name: Build Binary Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        # This tells GitHub to run the job twice: once on Linux, once on Windows
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      # This is the missing piece! It installs everything in your pyproject.toml
      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Build with PyInstaller
        # We use 'uv run' so it uses the pyinstaller installed in the .venv
        run: uv run pyinstaller --onefile --name "ai-agent" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-${{ matrix.os }}
          path: dist/
